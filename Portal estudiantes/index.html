<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Informes Estudiantiles</title>
  <meta
    name="description"
    content="Portal estático para consultar informes estudiantiles construidos desde Markdown."
  >
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div class="header-icon">📚</div>
    <div>
      <h1 id="headerTitle">Portal de Informes Estudiantiles</h1>
      <p id="headerSubtitle">Cargando fuente validada…</p>
    </div>
    <span class="period-badge" id="headerPeriod">NO ESPECIFICADO</span>
  </header>

  <div class="layout">
    <aside>
      <h3>Estudiantes</h3>
      <label class="sidebar-field">
        <span>Buscar</span>
        <input id="searchInput" type="search" placeholder="Nombre del estudiante">
      </label>
      <label class="sidebar-field">
        <span>Semáforo</span>
        <select id="signalFilter">
          <option value="TODOS">Todos</option>
          <option value="ROJO">Rojo</option>
          <option value="AMARILLO">Amarillo</option>
          <option value="VERDE">Verde</option>
          <option value="GRIS">Gris</option>
        </select>
      </label>
      <div id="student-list"></div>
    </aside>

    <main id="main-content">
      <div class="welcome">
        <div class="icon">🎓</div>
        <h2>Selecciona un estudiante</h2>
        <p>Elige un nombre del panel izquierdo para ver el informe completo derivado del Markdown.</p>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
